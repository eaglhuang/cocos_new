<!DOCTYPE html>
<html lang="zh-Hant" data-canvas-width="1334" data-canvas-height="750">
<head>
<style>
  .lobby { display:flex; flex-direction:column; gap:12px; padding:16px; background:#1a1a1a; }
  .mission-card { background:#000000; width:360px; height:120px; transition: opacity 180ms ease-out, transform 180ms ease-out; }
  .title { color:#ffffff; font-size:18px; line-height:26px; }
</style>
</head>
<body>
  <main class="lobby" data-anchor="fill" data-visual-zone="lobby-root">
    <section class="mission-card" data-name="MissionCard" data-ucuf-id="mission-card" data-visual-zone="mission-card">
      <p class="title" data-name="MissionTitle" data-contract="mission.title">今日軍務</p>
      <button data-name="MissionDetailButton" data-ucuf-id="mission-detail-btn" data-ucuf-action="openPanel" data-target="lobby-mission-detail-dialog" data-requires="mission.id">詳情</button>
    </section>
  </main>
</body>
</html>
