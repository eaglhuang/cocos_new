name: UCUF Validation

on:
  pull_request:
    paths:
      - 'assets/resources/ui-spec/**'
      - 'assets/scripts/ui/**'
      - 'assets/scripts/battle/**'
      - 'tests/ucuf/**'
      - 'tests/run-ucuf-only.ts'
      - 'tools_node/**'
      - 'package.json'
      - 'package-lock.json'
      - '.github/workflows/ucuf-validation.yml'
  push:
    branches:
      - main
      - master
    paths:
      - 'assets/resources/ui-spec/**'
      - 'assets/scripts/ui/**'
      - 'assets/scripts/battle/**'
      - 'tests/ucuf/**'
      - 'tests/run-ucuf-only.ts'
      - 'tools_node/**'
      - 'package.json'
      - 'package-lock.json'
      - '.github/workflows/ucuf-validation.yml'

jobs:
  ucuf-core:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Validate UI spec
        run: npm run check:ui-spec -- --strict --check-content-contract

      - name: Runtime check all screens
        run: node tools_node/ucuf-runtime-check.js --strict --json

      - name: Run UCUF tests
        run: npm run test:ucuf