<!DOCTYPE html><html><head><meta charset="utf-8"><link rel="stylesheet" href="../colors_and_type.css"><style>
*{box-sizing:border-box;margin:0}html,body{width:700px;background:#1A1A1A;color:var(--text-off-white);font-family:var(--font-body);padding:24px;overflow:hidden}
.lbl{font-family:var(--font-label);font-size:10px;letter-spacing:.1em;text-transform:uppercase;color:var(--text-khaki);margin-bottom:14px}
.row{display:flex;gap:12px;align-items:center}
.pl{display:flex;flex-direction:column;align-items:center;gap:6px}
.avatar{width:88px;height:88px;border-radius:50%;overflow:hidden;border:3px solid #D4AF37;box-shadow:0 0 12px rgba(212,175,55,.35),inset 0 0 0 1px #1a1a1a}
.avatar img{width:100%;height:100%;object-fit:cover;object-position:center 25%}
.cap{font-family:var(--font-headline);font-size:13px;color:#FFE088;font-weight:700}
</style></head><body>
<div class="lbl">General Avatars · Hero Portraits</div>
<div class="row">
  <div class="pl"><div class="avatar"><img src="../assets/avatars/cao_cao.png"></div><div class="cap">曹操</div></div>
  <div class="pl"><div class="avatar"><img src="../assets/avatars/guan_yu.png"></div><div class="cap">關羽</div></div>
  <div class="pl"><div class="avatar"><img src="../assets/avatars/zhang_fei.png"></div><div class="cap">張飛</div></div>
  <div class="pl"><div class="avatar"><img src="../assets/avatars/zhao_yun.png"></div><div class="cap">趙雲</div></div>
  <div class="pl"><div class="avatar"><img src="../assets/avatars/lu_bu.png"></div><div class="cap">呂布</div></div>
  <div class="pl"><div class="avatar"><img src="../assets/avatars/zhen_ji.png"></div><div class="cap">甄姬</div></div>
</div>
</body></html>
