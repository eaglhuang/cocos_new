<!DOCTYPE html><html><head><meta charset="utf-8"><link rel="stylesheet" href="../colors_and_type.css"><style>
*{box-sizing:border-box;margin:0}html,body{width:700px;background:#0F0F0F;font-family:var(--font-body);padding:24px;overflow:hidden}
.lbl{font-family:var(--font-label);font-size:10px;letter-spacing:.1em;text-transform:uppercase;color:var(--text-khaki);margin-bottom:14px}
.row{display:flex;gap:14px;align-items:flex-end}
.cell{width:86px;display:flex;flex-direction:column;align-items:center;gap:6px}
.frame{width:86px;height:86px;border-radius:10px;background:#20201F;display:flex;align-items:center;justify-content:center;position:relative;overflow:hidden;border:2px solid #4D4635}
.frame img{width:54px;height:54px;object-fit:contain}
.name{font-family:var(--font-label);font-size:10px;color:#D0C5AF;letter-spacing:.06em;font-weight:600}
.c-common{border-color:#9a9a9a;box-shadow:inset 0 0 0 1px rgba(255,255,255,.08)}
.c-uncommon{border-color:#4CAF50;box-shadow:0 0 8px rgba(76,175,80,.45)}
.c-rare{border-color:#2196F3;box-shadow:0 0 10px rgba(33,150,243,.55)}
.c-epic{border-color:#9C27B0;box-shadow:0 0 12px rgba(156,39,176,.6)}
.c-legendary{border-color:#FFC107;box-shadow:0 0 14px rgba(255,193,7,.7)}
.c-mythic{border-color:#D32F2F;box-shadow:0 0 16px rgba(211,47,47,.75)}
.c-artifact{border-color:#00FBFF;box-shadow:0 0 20px rgba(0,251,255,.8)}
.badge{position:absolute;left:4px;top:4px;font-family:var(--font-label);font-size:9px;font-weight:800;color:#fff;padding:2px 5px;border-radius:3px;letter-spacing:.08em}
</style></head><body>
<div class="lbl">Item Cells · Rarity Borders</div>
<div class="row">
  <div class="cell"><div class="frame c-common"><span class="badge" style="background:#555">N</span></div><div class="name">COMMON</div></div>
  <div class="cell"><div class="frame c-uncommon"><span class="badge" style="background:#2e7c32">R</span></div><div class="name">RARE</div></div>
  <div class="cell"><div class="frame c-rare"><span class="badge" style="background:#1565c0">SR</span></div><div class="name">SR</div></div>
  <div class="cell"><div class="frame c-epic"><span class="badge" style="background:#6a1b9a">SSR</span></div><div class="name">SSR</div></div>
  <div class="cell"><div class="frame c-legendary"><span class="badge" style="background:#c68400;color:#2D1E00">UR</span></div><div class="name">UR</div></div>
  <div class="cell"><div class="frame c-mythic"><span class="badge" style="background:#9a1414">LR</span></div><div class="name">LR</div></div>
  <div class="cell"><div class="frame c-artifact"><span class="badge" style="background:#006b7a">RB</span></div><div class="name">RAINBOW</div></div>
</div>
</body></html>
