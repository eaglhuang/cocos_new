<!DOCTYPE html><html><head><meta charset="utf-8"><link rel="stylesheet" href="../colors_and_type.css"><style>
*{box-sizing:border-box;margin:0}html,body{width:700px;background:#1A1A1A;font-family:var(--font-body);padding:24px;overflow:hidden}
.lbl{font-family:var(--font-label);font-size:10px;letter-spacing:.1em;text-transform:uppercase;color:#B0A880;margin-bottom:14px}
.row{display:flex;gap:10px;align-items:center}
.badge{padding:5px 11px;border-radius:4px;font-family:var(--font-label);font-weight:800;color:#fff;font-size:12px;letter-spacing:.1em;box-shadow:inset 0 1px 0 rgba(255,255,255,.25),0 2px 4px rgba(0,0,0,.35)}
.pill{padding:4px 12px;border-radius:9999px;font-family:var(--font-label);font-size:11px;letter-spacing:.08em;font-weight:700}
.chip-gold{background:linear-gradient(180deg,#FFE088,#D4AF37);color:#2D1E00}
.chip-jade{background:#A4D2D0;color:#1F302B}
.chip-ink{background:#20201F;color:#E8E4DC;border:1px solid #4D4635}
.chip-rose{background:#B22222;color:#fff}
.dot{width:10px;height:10px;border-radius:50%;background:#FF6B6B;box-shadow:0 0 6px rgba(255,107,107,.6)}
</style></head><body>
<div class="lbl">Badges · Pills · Notifications</div>
<div class="row" style="margin-bottom:12px">
  <div class="badge" style="background:#555">N</div>
  <div class="badge" style="background:#2e7c32">R</div>
  <div class="badge" style="background:#1565c0">SR</div>
  <div class="badge" style="background:#6a1b9a">SSR</div>
  <div class="badge" style="background:linear-gradient(180deg,#FFE088,#D4AF37);color:#2D1E00">UR</div>
  <div class="badge" style="background:#9a1414">LR</div>
</div>
<div class="row">
  <div class="pill chip-gold">出戰</div>
  <div class="pill chip-jade">新 章</div>
  <div class="pill chip-ink">LV · 42</div>
  <div class="pill chip-rose">限時 2D</div>
  <div class="dot"></div>
</div>
</body></html>
