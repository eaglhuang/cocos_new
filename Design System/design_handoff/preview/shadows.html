<!DOCTYPE html><html><head><meta charset="utf-8"><link rel="stylesheet" href="../colors_and_type.css"><style>
*{box-sizing:border-box;margin:0}html,body{width:700px;background:#1A1A1A;color:var(--text-off-white);font-family:var(--font-body);padding:22px 26px;overflow:hidden}
.lbl{font-family:var(--font-label);font-size:10px;letter-spacing:.1em;text-transform:uppercase;color:var(--text-khaki);margin-bottom:18px}
.row{display:flex;gap:20px;align-items:center;justify-content:flex-start}
.e{width:90px;height:70px;background:#E8DFD0;border-radius:8px}
.cap{font-family:var(--font-label);font-size:10px;color:var(--text-khaki);margin-top:8px;text-align:center;letter-spacing:.06em}
.col{display:flex;flex-direction:column;align-items:center}
.s1{box-shadow:0 2px 4px rgba(0,0,0,.2)}
.s2{box-shadow:0 4px 12px rgba(0,0,0,.3)}
.s3{box-shadow:0 12px 24px rgba(0,0,0,.4)}
.s4{box-shadow:0 0 30px rgba(255,193,7,.75),0 0 60px rgba(255,193,7,.4)}
.s5{box-shadow:0 0 40px rgba(0,251,255,.9),0 0 80px rgba(0,251,255,.5)}
.s6{box-shadow:0 0 25px rgba(140,207,196,.7),0 0 50px rgba(140,207,196,.35)}
</style></head><body>
<div class="lbl">Shadow & Glow System</div>
<div class="row">
  <div class="col"><div class="e s1"></div><div class="cap">SM</div></div>
  <div class="col"><div class="e s2"></div><div class="cap">MD</div></div>
  <div class="col"><div class="e s3"></div><div class="cap">LG</div></div>
  <div class="col"><div class="e s4"></div><div class="cap">GLOW GOLD</div></div>
  <div class="col"><div class="e s6"></div><div class="cap">GLOW JADE</div></div>
  <div class="col"><div class="e s5"></div><div class="cap">RAINBOW</div></div>
</div>
</body></html>
