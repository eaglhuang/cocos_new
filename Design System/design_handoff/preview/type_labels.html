<!DOCTYPE html><html><head><meta charset="utf-8"><link rel="stylesheet" href="../colors_and_type.css"><style>
*{box-sizing:border-box;margin:0}html,body{width:700px;background:var(--parchment-base);color:var(--text-ink);font-family:var(--font-body);padding:22px 26px;overflow:hidden}
.lbl{font-family:var(--font-label);font-size:10px;letter-spacing:.1em;text-transform:uppercase;color:var(--text-on-parchment-muted);margin-bottom:4px}
.row{margin-bottom:12px;display:flex;align-items:baseline;gap:18px;flex-wrap:wrap}
.micro{font-family:var(--font-label);text-transform:uppercase;letter-spacing:.1em;font-weight:700;color:var(--text-on-parchment-muted)}
.num{font-family:var(--font-num);font-variant-numeric:tabular-nums;color:var(--text-ink)}
</style></head><body>
<div class="lbl">Labels · Manrope · Uppercase micro-label style</div>
<div class="row">
  <div><span class="micro" style="font-size:12px">LV</span> <span class="num" style="font-size:22px;font-weight:700">42</span></div>
  <div><span class="micro" style="font-size:12px">ATK</span> <span class="num" style="font-size:22px;font-weight:700">1,248</span></div>
  <div><span class="micro" style="font-size:12px">HP</span> <span class="num" style="font-size:22px;font-weight:700">9,400</span></div>
  <div><span class="micro" style="font-size:12px">COST</span> <span class="num" style="font-size:22px;font-weight:700">3</span></div>
</div>
<div class="lbl" style="margin-top:14px">Tabular numbers — counters shouldn't jitter</div>
<div class="row" style="gap:30px">
  <span class="num" style="font-size:26px">01 : 58 : 32</span>
  <span class="num" style="font-size:26px;color:#1B6B3A">+2,480</span>
  <span class="num" style="font-size:26px;color:#B22222">−640</span>
</div>
</body></html>
