<!DOCTYPE html><html><head><meta charset="utf-8"><link rel="stylesheet" href="../colors_and_type.css"><style>
*{box-sizing:border-box;margin:0}html,body{width:700px;background:var(--parchment-base);color:var(--text-ink);font-family:var(--font-body);padding:22px 26px;overflow:hidden}
.lbl{font-family:var(--font-label);font-size:10px;letter-spacing:.1em;text-transform:uppercase;color:var(--text-on-parchment-muted);margin-bottom:10px}
.row{display:flex;gap:10px;align-items:flex-end}
.tok{display:flex;flex-direction:column;align-items:center;gap:6px;font-family:var(--font-label);font-size:10px;color:var(--text-on-parchment-muted)}
.tok b{color:var(--text-ink);font-weight:700}
.box{background:#3F6A62;border-radius:4px}
</style></head><body>
<div class="lbl">Spacing Tokens · 4 · 8 · 12 · 16 · 24 · 32 · 48</div>
<div class="row">
  <div class="tok"><div class="box" style="width:4px;height:40px"></div><b>xs</b>4</div>
  <div class="tok"><div class="box" style="width:8px;height:40px"></div><b>sm</b>8</div>
  <div class="tok"><div class="box" style="width:12px;height:40px"></div><b>md</b>12</div>
  <div class="tok"><div class="box" style="width:16px;height:40px"></div><b>lg</b>16</div>
  <div class="tok"><div class="box" style="width:24px;height:40px"></div><b>xl</b>24</div>
  <div class="tok"><div class="box" style="width:32px;height:40px"></div><b>xxl</b>32</div>
  <div class="tok"><div class="box" style="width:48px;height:40px"></div><b>section</b>48</div>
</div>
</body></html>
