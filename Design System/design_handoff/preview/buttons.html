<!DOCTYPE html><html><head><meta charset="utf-8"><link rel="stylesheet" href="../colors_and_type.css"><style>
*{box-sizing:border-box;margin:0}html,body{width:700px;background:#1A1A1A;color:var(--text-off-white);font-family:var(--font-body);padding:26px;overflow:hidden}
.lbl{font-family:var(--font-label);font-size:10px;letter-spacing:.1em;text-transform:uppercase;color:var(--text-khaki);margin-bottom:14px}
.row{display:flex;gap:12px;align-items:center;flex-wrap:wrap}
.btn{min-width:160px;height:56px;display:flex;align-items:center;justify-content:center;font-family:var(--font-label);font-weight:700;letter-spacing:.08em;cursor:pointer}
.gold{background:linear-gradient(180deg,#FFE088,#D4AF37 60%,#8A6E1F);color:#2D1E00;border:2px solid #3a2b08;border-radius:10px;box-shadow:inset 0 1px 0 rgba(255,255,255,.5),0 4px 0 #3a2b08,0 6px 12px rgba(0,0,0,.5)}
.dark{background:linear-gradient(180deg,#3a3a3a,#1a1a1a);color:#E8E4DC;border:2px solid #0a0a0a;border-radius:10px;box-shadow:inset 0 1px 0 rgba(255,255,255,.15),0 3px 0 #000,0 4px 8px rgba(0,0,0,.6)}
.ghost{background:transparent;color:#FFE088;border:1.5px solid #D4AF37;border-radius:10px}
.dis{opacity:.38;pointer-events:none}
</style></head><body>
<div class="lbl">Buttons · Gold CTA · Dark Metal · Ghost · Disabled</div>
<div class="row">
  <div class="btn gold">出戰</div>
  <div class="btn dark">返回</div>
  <div class="btn ghost">更多</div>
  <div class="btn gold dis">領取</div>
</div>
</body></html>
